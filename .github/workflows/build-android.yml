name: Build Formatica Android APK

on:
  workflow_dispatch:  # Manual trigger
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      split_per_abi:
        description: 'Split APK per ABI (recommended)'
        required: true
        default: true
        type: boolean
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - 'formatica_mobile/**'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: |
          cd formatica_mobile
          flutter doctor -v

      - name: Accept Android licenses
        run: |
          cd formatica_mobile
          echo "Accepting Android SDK licenses..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          flutter doctor --android-licenses || true

      - name: Get dependencies
        run: |
          cd formatica_mobile
          echo "Cleaning previous builds..."
          flutter clean
          echo "Getting dependencies..."
          flutter pub get
          echo "Dependencies installed successfully"
          echo "Current directory: $(pwd)"
          echo "Files in lib/:"
          ls -la formatica_mobile/lib/ 2>/dev/null || ls -la lib/ 2>/dev/null || echo "WARNING: lib/ not found in $(pwd)"

      - name: Analyze code
        run: |
          cd formatica_mobile
          flutter analyze
        continue-on-error: true

      # Note: Flutter tests are optional for APK build - we focus on successful compilation

      - name: Build APK (Release - Split per ABI)
        if: github.event.inputs.build_type == 'release' && github.event.inputs.split_per_abi == 'true'
        run: |
          cd formatica_mobile
          echo "=========================================="
          echo "Building release APK with split per ABI..."
          echo "Current directory: $(pwd)"
          echo "Checking for lib/main.dart..."
          ls -la lib/main.dart
          echo "=========================================="
          
          # Build with verbose output
          set -e  # Exit on error
          flutter build apk --release --split-per-abi --verbose 2>&1 | tee build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "ERROR: Flutter build failed with exit code $BUILD_EXIT_CODE"
            exit 1
          fi
          
          echo "Build completed successfully. Checking for APKs..."
          
          # Check if APK directory exists
          if [ ! -d "build/app/outputs/flutter-apk" ]; then
            echo "ERROR: APK output directory not found"
            echo "Searching for APK files..."
            find . -name "*.apk" -type f
            exit 1
          fi
          
          # List APKs
          ls -lh build/app/outputs/flutter-apk/
          
          # Verify all 3 APKs exist
          APK_COUNT=$(find build/app/outputs/flutter-apk/ -name "*.apk" -type f | wc -l)
          echo "Found $APK_COUNT APK files"
          
          if [ $APK_COUNT -lt 3 ]; then
            echo "ERROR: Expected 3 APK files but found $APK_COUNT"
            exit 1
          fi
          
          echo "All APKs generated successfully!"
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError"
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=2g"

      - name: Build APK (Release - Universal)
        if: github.event.inputs.build_type == 'release' && github.event.inputs.split_per_abi != 'true'
        run: |
          cd formatica_mobile
          echo "=========================================="
          echo "Building universal release APK..."
          echo "Current directory: $(pwd)"
          echo "=========================================="
          
          set -e
          flutter build apk --release --verbose 2>&1 | tee build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "ERROR: Flutter build failed with exit code $BUILD_EXIT_CODE"
            exit 1
          fi
          
          echo "Build completed successfully. Checking for APKs..."
          ls -lh build/app/outputs/flutter-apk/ || echo "WARNING: No APKs found"
          find . -name "*.apk" -type f || echo "WARNING: No APKs found anywhere"
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError"
          JAVA_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=2g"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            formatica_mobile/build.log
            formatica_mobile/android/app/build/outputs/logs/*.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload APK artifacts (Split ABI)
        if: github.event.inputs.build_type == 'release' && github.event.inputs.split_per_abi == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Formatica-Android-Release-APKs
          path: formatica_mobile/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK artifact (Universal Release)
        if: github.event.inputs.build_type == 'release' && github.event.inputs.split_per_abi != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Formatica-Android-Universal-Release
          path: formatica_mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK artifact (Debug)
        if: github.event.inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: Formatica-Android-Debug
          path: formatica_mobile/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            formatica_mobile/build/app/outputs/flutter-apk/app-*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        if: always()
        run: |
          cd formatica_mobile
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Type:** ${{ github.event.inputs.build_type || 'release' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Split per ABI:** ${{ github.event.inputs.split_per_abi || 'true' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated APKs:" >> $GITHUB_STEP_SUMMARY
          ls -lh build/app/outputs/flutter-apk/*.apk 2>/dev/null | awk '{print "- `" $9 "` (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "No APKs found - build may have failed" >> $GITHUB_STEP_SUMMARY
