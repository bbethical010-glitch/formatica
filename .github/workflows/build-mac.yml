name: Build Formatica Mac

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        working-directory: packages/desktop
        run: npm install

      - name: Build for Apple Silicon (M1/M2/M3)
        working-directory: packages/desktop
        run: npx tauri build --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Build for Intel Mac
        working-directory: packages/desktop
        run: npx tauri build --target x86_64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Upload Apple Silicon DMG
        uses: actions/upload-artifact@v4
        with:
          name: Formatica-Mac-AppleSilicon
          path: packages/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload Intel Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: Formatica-Mac-Intel
          path: packages/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn
