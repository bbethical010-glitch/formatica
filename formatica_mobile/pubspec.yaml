name: formatica_mobile
description: Formatica — File conversion and media utility for Android and iOS.
publish_to: none
version: 2.1.0+3

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # On-device FFmpeg (video/audio processing — no internet needed)
  ffmpeg_kit_flutter_new: ^4.1.0

  # Typography support
  google_fonts: ^6.2.1

  # File picking and saving
  file_picker: ^8.0.3
  open_filex: ^4.4.1
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  app_settings: ^5.1.1
  path: ^1.9.0

  # On-device image handling and PDF generation
  image: ^4.1.7
  pdf: ^3.10.8
  printing: ^5.12.0

  # On-device PDF merge, split, greyscale (Syncfusion community license — free)
  syncfusion_flutter_pdf: ^27.2.5

  # State management
  provider: ^6.1.2

  # UI utilities
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  url_launcher: ^6.2.5
  webview_flutter: ^4.13.0
  webview_flutter_android: ^4.10.15
  webview_flutter_wkwebview: ^3.24.2

  # Storage
  shared_preferences: ^2.2.3

  # HTTP client for backend API
  dio: ^5.4.3
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/pandoc/
    - assets/pandoc/wasi/
